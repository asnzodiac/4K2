services:
  - type: web
    name: adimma-kann-bot
    env: python
    region: oregon
    plan: free
    branch: main
    # Specify Python version explicitly
    runtime: python
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn bot:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --log-level info
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: tts-cache
      mountPath: /opt/render/project/src/tts_cache
      sizeGB: 1

# System packages (ffmpeg is available by default on Render)
